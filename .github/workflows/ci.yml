name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: 执行测试
        run: |
          go test ./...
          (cd pkg/client && go test ./...)
