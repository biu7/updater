# 在推送以 v 开头的 git tag 时构建 Docker 镜像并推送到 GHCR（与仓库同名的 ghcr.io/<owner>/<repo>）。
# latest 仅在「正式版」tag 上更新：形如 v主.次.补丁（纯数字），不含 -rc、-beta 等预发布后缀。
name: Docker 构建并推送

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 执行测试
        run: go test ./...

      - name: 规范化镜像仓库路径（GHCR 要求小写）
        id: image
        run: |
          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${{ env.REGISTRY }}/${repo_lower}" >> "$GITHUB_OUTPUT"

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 判断是否为正式版 tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 提取镜像标签（git tag；正式版额外打 latest）
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ steps.release.outputs.is_release == 'true' }}

      - name: 构建并推送
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
