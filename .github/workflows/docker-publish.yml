# 在推送以 v 开头的 git tag 时构建 Docker 镜像并推送到 GHCR（与仓库同名的 ghcr.io/<owner>/<repo>）。
# latest 仅在「正式版」tag 上更新：形如 v主.次.补丁（纯数字），不含 -rc、-beta 等预发布后缀。
name: Docker 构建并推送

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: 执行测试
        run: |
          go test ./...
          (cd pkg/client && go test ./...)

  prepare:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.image.outputs.name }}
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - name: 规范化镜像仓库路径（GHCR 要求小写）
        id: image
        run: |
          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${{ env.REGISTRY }}/${repo_lower}" >> "$GITHUB_OUTPUT"

      - name: 判断是否为正式版 tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 提取镜像标签（git tag；正式版额外打 latest）
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ steps.release.outputs.is_release == 'true' }}

  build:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 登录 GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送 amd64 镜像
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          tags: ${{ needs.prepare.outputs.tags }}
          labels: ${{ needs.prepare.outputs.labels }}
          push: true
          cache-from: type=registry,ref=${{ needs.prepare.outputs.image_name }}:buildcache
          cache-to: type=registry,ref=${{ needs.prepare.outputs.image_name }}:buildcache,mode=max
          provenance: false

  cleanup:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: 清理 GHCR 历史镜像
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          keep-n-tagged: 10
          delete-untagged: true
          exclude-tags: latest,buildcache
